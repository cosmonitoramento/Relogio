<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Relógio Digital - Dia do Trabalhador 🏆</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --worker-red:   #E63946;
      --worker-gold:  #F4A011;
      --worker-green: #2DC653;
      --worker-blue:  #1B98E0;
      --worker-white: #FFFFFF;
      --dark-bg:      #0D1B2A;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: 4vh;
      background: radial-gradient(ellipse at 30% 20%, #0a1628 0%, #0D1B2A 60%, #050e1a 100%);
      font-family: 'Arial Black', Arial, sans-serif;
      overflow: hidden;
      position: relative;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 20%, rgba(244,160,17,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 50% 50% at 80% 80%, rgba(27,152,224,0.07) 0%, transparent 60%);
      z-index: 1;
      pointer-events: none;
    }

    /* ── ELEMENTOS CAINDO ── */
    .floaties {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      overflow: hidden;
    }

    .floaty {
      position: absolute;
      top: -80px;
      animation: fall linear infinite;
      font-size: 2.8em;
      opacity: 0.92;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
    }

    .floaty:nth-child(1)  { left: 4%;  font-size: 3em;   animation-duration: 10s; animation-delay: 0s; }
    .floaty:nth-child(2)  { left: 12%; font-size: 2.5em; animation-duration: 13s; animation-delay: 1s; }
    .floaty:nth-child(3)  { left: 21%; font-size: 3.2em; animation-duration: 11s; animation-delay: 2s; }
    .floaty:nth-child(4)  { left: 30%; font-size: 2.8em; animation-duration: 14s; animation-delay: 0.5s; }
    .floaty:nth-child(5)  { left: 40%; font-size: 3em;   animation-duration: 10s; animation-delay: 1.5s; }
    .floaty:nth-child(6)  { left: 51%; font-size: 2.6em; animation-duration: 12s; animation-delay: 2.5s; }
    .floaty:nth-child(7)  { left: 61%; font-size: 3.1em; animation-duration: 11s; animation-delay: 0.8s; }
    .floaty:nth-child(8)  { left: 70%; font-size: 2.7em; animation-duration: 13s; animation-delay: 1.8s; }
    .floaty:nth-child(9)  { left: 80%; font-size: 3em;   animation-duration: 10s; animation-delay: 2.2s; }
    .floaty:nth-child(10) { left: 90%; font-size: 2.9em; animation-duration: 14s; animation-delay: 3s; }
    .floaty:nth-child(11) { left: 7%;  font-size: 2.5em; animation-duration: 12s; animation-delay: 4s; }
    .floaty:nth-child(12) { left: 46%; font-size: 3em;   animation-duration: 9s;  animation-delay: 0.3s; }
    .floaty:nth-child(13) { left: 66%; font-size: 2.6em; animation-duration: 15s; animation-delay: 1.2s; }
    .floaty:nth-child(14) { left: 35%; font-size: 2.8em; animation-duration: 11s; animation-delay: 3.5s; }
    .floaty:nth-child(15) { left: 56%; font-size: 3.2em; animation-duration: 13s; animation-delay: 2.8s; }

    @keyframes fall {
      0%   { top: -10%; opacity: 0;    transform: translateX(0)    rotate(0deg); }
      8%   { opacity: 0.92; }
      92%  { opacity: 0.7; }
      100% { top: 110%;  opacity: 0;   transform: translateX(60px) rotate(450deg); }
    }

    /* ── LAYOUT CENTRAL ── */
    .main-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      width: 100%;
      max-width: 620px;
      padding: 0 14px;
      position: relative;
      z-index: 10;
    }

    /* ── PLACAR ARENA ── */
    .arena-board {
      background: #0a0f1a;
      border: 3px solid var(--worker-gold);
      border-radius: 20px;
      padding: 26px 44px 22px;
      width: 100%;
      box-shadow:
        0 0 0 1px #000,
        0 0 50px rgba(244,160,17,0.2),
        0 10px 40px rgba(0,0,0,0.85),
        inset 0 1px 0 rgba(255,255,255,0.06);
      position: relative;
      overflow: hidden;
      text-align: center;
    }

    .arena-board::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        -55deg,
        transparent 0px, transparent 18px,
        rgba(255,255,255,0.013) 18px, rgba(255,255,255,0.013) 20px
      );
      pointer-events: none;
    }

    /* Borda LED girando */
    .led-ring {
      position: absolute;
      inset: -3px;
      border-radius: 22px;
      background: conic-gradient(
        var(--worker-gold), var(--worker-red), var(--worker-blue),
        var(--worker-green), var(--worker-gold)
      );
      animation: rotateLED 5s linear infinite;
      opacity: 0.45;
      z-index: -1;
    }
    .led-ring-cover {
      position: absolute;
      inset: 3px;
      border-radius: 18px;
      background: #0a0f1a;
      z-index: -1;
    }

    @keyframes rotateLED { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    /* ── TÍTULO ── */
    .clock-header {
      font-size: 1.3rem;
      font-weight: 900;
      background: linear-gradient(90deg,
        var(--worker-gold), #fff, var(--worker-red), var(--worker-gold), #fff
      );
      background-size: 300% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 2px;
      text-transform: uppercase;
      animation: shineText 4s linear infinite;
      margin-bottom: 12px;
    }

    @keyframes shineText {
      0%   { background-position: 0% center; }
      100% { background-position: 300% center; }
    }

    /* ── HORA LED ── */
    .time-display {
      font-size: 5.8rem;
      font-weight: 900;
      color: var(--worker-gold);
      letter-spacing: 0.06em;
      font-family: 'Courier New', monospace;
      margin-bottom: 2px;
      text-shadow:
        0 0 30px rgba(244,160,17,0.9),
        0 0 60px rgba(244,160,17,0.4),
        3px 3px 6px rgba(0,0,0,0.95);
      animation: ledPulse 1s ease-in-out infinite alternate;
    }

    @keyframes ledPulse {
      0%   { text-shadow: 0 0 20px rgba(244,160,17,0.8), 3px 3px 6px rgba(0,0,0,0.9); }
      100% { text-shadow: 0 0 50px rgba(244,160,17,1), 0 0 90px rgba(244,160,17,0.3), 3px 3px 6px rgba(0,0,0,0.9); }
    }

    .seconds-display {
      font-size: 1.4rem;
      font-family: 'Courier New', monospace;
      font-weight: 900;
      color: var(--worker-red);
      text-shadow: 0 0 14px rgba(230,57,70,0.9);
      margin-bottom: 10px;
      animation: blinkSecs 1s ease-in-out infinite;
    }

    @keyframes blinkSecs {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.65; transform: scale(1.1); }
    }

    .date-display {
      font-size: 0.92rem;
      color: rgba(255,255,255,0.8);
      font-weight: 700;
      text-transform: capitalize;
      letter-spacing: 1px;
      margin-bottom: 8px;
      font-family: Arial, sans-serif;
    }

    .timezone {
      font-size: 0.78rem;
      color: rgba(255,255,255,0.7);
      background: rgba(244,160,17,0.1);
      border: 1px solid rgba(244,160,17,0.3);
      border-radius: 20px;
      padding: 4px 14px;
      display: inline-block;
      font-weight: 700;
      margin-bottom: 12px;
      font-family: Arial, sans-serif;
    }

    .worker-message {
      font-size: 0.9rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      background: linear-gradient(90deg,
        var(--worker-green), var(--worker-blue), var(--worker-gold),
        var(--worker-red), var(--worker-green)
      );
      background-size: 300% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shineText 3s linear infinite;
      font-family: Arial, sans-serif;
    }

    /* Cantos do card */
    .corner-deco {
      position: absolute;
      font-size: 2rem;
      animation: floatCorner 3s ease-in-out infinite;
      line-height: 1;
    }
    .corner-deco.tl { top: 10px; left: 12px; animation-delay: 0s; }
    .corner-deco.tr { top: 10px; right: 12px; animation-delay: 0.7s; }
    .corner-deco.bl { bottom: 10px; left: 12px; animation-delay: 1.4s; }
    .corner-deco.br { bottom: 10px; right: 12px; animation-delay: 1s; }

    @keyframes floatCorner {
      0%, 100% { transform: translateY(0) scale(1); }
      50%       { transform: translateY(-7px) scale(1.15); }
    }

    /* ── GRADE DE JOGOS ── */
    .games-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      width: 100%;
    }

    .game-card {
      background: rgba(255,255,255,0.04);
      border-radius: 12px;
      padding: 10px 6px;
      text-align: center;
      backdrop-filter: blur(8px);
      animation: cardPop 0.5s ease both;
      position: relative;
      overflow: hidden;
    }

    .game-card:nth-child(1) { border: 1.5px solid rgba(230,57,70,0.45);   animation-delay: 0.1s; }
    .game-card:nth-child(2) { border: 1.5px solid rgba(244,160,17,0.45);  animation-delay: 0.15s; }
    .game-card:nth-child(3) { border: 1.5px solid rgba(27,152,224,0.45);  animation-delay: 0.2s; }
    .game-card:nth-child(4) { border: 1.5px solid rgba(45,198,83,0.45);   animation-delay: 0.25s; }
    .game-card:nth-child(5) { border: 1.5px solid rgba(244,160,17,0.45);  animation-delay: 0.3s; }
    .game-card:nth-child(6) { border: 1.5px solid rgba(230,57,70,0.45);   animation-delay: 0.35s; }
    .game-card:nth-child(7) { border: 1.5px solid rgba(27,152,224,0.45);  animation-delay: 0.4s; }
    .game-card:nth-child(8) { border: 1.5px solid rgba(45,198,83,0.45);   animation-delay: 0.45s; }

    @keyframes cardPop {
      0%   { opacity: 0; transform: scale(0.8) translateY(12px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    .game-card:hover { background: rgba(255,255,255,0.09); transform: translateY(-3px) scale(1.04); transition: all 0.3s; }

    .game-icon {
      font-size: 2.4rem;
      display: block;
      margin-bottom: 4px;
      animation: bounceIcon 2s ease-in-out infinite;
    }

    .game-card:nth-child(1) .game-icon { animation-delay: 0s; }
    .game-card:nth-child(2) .game-icon { animation-delay: 0.25s; }
    .game-card:nth-child(3) .game-icon { animation-delay: 0.5s; }
    .game-card:nth-child(4) .game-icon { animation-delay: 0.75s; }
    .game-card:nth-child(5) .game-icon { animation-delay: 1s; }
    .game-card:nth-child(6) .game-icon { animation-delay: 1.25s; }
    .game-card:nth-child(7) .game-icon { animation-delay: 1.5s; }
    .game-card:nth-child(8) .game-icon { animation-delay: 1.75s; }

    @keyframes bounceIcon {
      0%, 100% { transform: translateY(0) rotate(0deg) scale(1); }
      30%       { transform: translateY(-8px) rotate(-10deg) scale(1.1); }
      60%       { transform: translateY(-4px) rotate(6deg) scale(1.05); }
    }

    .game-label {
      font-size: 0.58rem;
      font-weight: 900;
      color: rgba(255,255,255,0.7);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      font-family: Arial, sans-serif;
    }

    .score-live {
      font-size: 0.78rem;
      font-weight: 900;
      color: var(--worker-gold);
      font-family: 'Courier New', monospace;
      margin-top: 2px;
    }

    /* ── BANNER ── */
    .worker-banner {
      width: 100%;
    }

    .banner-inner {
      background: linear-gradient(90deg,
        rgba(230,57,70,0.14), rgba(244,160,17,0.14), rgba(27,152,224,0.14)
      );
      border: 1.5px solid rgba(244,160,17,0.28);
      border-radius: 12px;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .banner-flag {
      font-size: 1.6rem;
      animation: wavFlag 1.5s ease-in-out infinite alternate;
    }

    @keyframes wavFlag {
      0%   { transform: rotate(-6deg); }
      100% { transform: rotate(6deg); }
    }

    .banner-text {
      font-size: 0.8rem;
      font-weight: 900;
      color: rgba(255,255,255,0.9);
      text-transform: uppercase;
      letter-spacing: 2px;
      font-family: Arial, sans-serif;
    }

    /* ════════════════════════════════════
       BONEQUINHOS SVG — MODAL OVERLAY
    ════════════════════════════════════ */
    #athlete-modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 99999;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(4px);
    }

    #athlete-modal.active {
      display: flex;
    }

    .athlete-box {
      background: linear-gradient(145deg, #0d1f38, #0a1220);
      border: 3px solid var(--worker-gold);
      border-radius: 24px;
      padding: 30px 40px 24px;
      text-align: center;
      position: relative;
      box-shadow: 0 0 60px rgba(244,160,17,0.3), 0 20px 60px rgba(0,0,0,0.8);
      max-width: 360px;
      width: 90%;
      animation: modalIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    @keyframes modalIn {
      0%   { opacity: 0; transform: scale(0.6) translateY(40px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    .athlete-sport-label {
      font-size: 1rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-bottom: 8px;
      background: linear-gradient(90deg, var(--worker-gold), var(--worker-red), var(--worker-gold));
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shineText 2s linear infinite;
    }

    .athlete-svg-wrap {
      margin: 8px auto;
      width: 200px;
      height: 200px;
    }

    .athlete-svg-wrap svg {
      width: 100%;
      height: 100%;
    }

    .athlete-close-btn {
      margin-top: 16px;
      background: rgba(244,160,17,0.15);
      border: 1.5px solid rgba(244,160,17,0.5);
      border-radius: 30px;
      color: var(--worker-gold);
      font-size: 0.82rem;
      font-weight: 900;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 8px 28px;
      cursor: pointer;
      font-family: Arial, sans-serif;
      transition: all 0.2s;
    }

    .athlete-close-btn:hover {
      background: rgba(244,160,17,0.3);
    }

    /* Countdown no canto do modal */
    .modal-countdown {
      position: absolute;
      top: 12px;
      right: 16px;
      font-size: 0.7rem;
      color: rgba(255,255,255,0.4);
      font-family: 'Courier New', monospace;
    }

    /* ── RESPONSIVO ── */
    @media (max-width: 520px) {
      .arena-board { padding: 20px 18px 16px; }
      .time-display { font-size: 3.8rem; }
      .clock-header { font-size: 1rem; }
      .games-grid { grid-template-columns: repeat(4, 1fr); gap: 5px; }
      .game-icon { font-size: 1.8rem; }
      .game-label { font-size: 0.5rem; }
      .corner-deco { font-size: 1.4rem; }
    }

    @media (max-width: 380px) {
      .games-grid { grid-template-columns: repeat(4, 1fr); }
      .game-icon { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

  <!-- ELEMENTOS CAINDO (emojis esportivos grandes) -->
  <div class="floaties">
    <div class="floaty">⚽</div>
    <div class="floaty">🏀</div>
    <div class="floaty">🏓</div>
    <div class="floaty">🏐</div>
    <div class="floaty">⚡</div>
    <div class="floaty">🏆</div>
    <div class="floaty">🎾</div>
    <div class="floaty">🏅</div>
    <div class="floaty">🤸</div>
    <div class="floaty">🎯</div>
    <div class="floaty">🏋️</div>
    <div class="floaty">🤾</div>
    <div class="floaty">⚽</div>
    <div class="floaty">🏀</div>
    <div class="floaty">🏓</div>
  </div>

  <!-- MODAL BONEQUINHO ATLETA -->
  <div id="athlete-modal">
    <div class="athlete-box">
      <div class="modal-countdown" id="modal-cd">Fechando em 8s</div>
      <div class="athlete-sport-label" id="athlete-label">Basquete</div>
      <div class="athlete-svg-wrap" id="athlete-svg-wrap"></div>
      <button class="athlete-close-btn" onclick="closeAthleteModal()">✕ fechar</button>
    </div>
  </div>

  <!-- CONTEÚDO PRINCIPAL -->
  <div class="main-wrap">

    <!-- PLACAR PRINCIPAL -->
    <div class="arena-board">
      <div class="led-ring"></div>
      <div class="led-ring-cover"></div>

      <div class="corner-deco tl">⚡</div>
      <div class="corner-deco tr">🏆</div>
      <div class="corner-deco bl">⚽</div>
      <div class="corner-deco br">🏀</div>

      <div class="clock-header">🏆 DIA DO TRABALHADOR 🏆</div>
      <div class="time-display" id="time">--:--</div>
      <div class="seconds-display" id="seconds">--s</div>
      <div class="date-display" id="date"></div>
      <div class="timezone" id="timezone"></div>
      <div class="worker-message" id="worker-msg"></div>
    </div>

    <!-- GRADE 8 ESPORTES -->
    <div class="games-grid">
      <div class="game-card"><span class="game-icon">🏀</span><div class="game-label">Basquete</div><div class="score-live" id="sc1">--</div></div>
      <div class="game-card"><span class="game-icon">⚽</span><div class="game-label">Futebol</div><div class="score-live" id="sc2">--</div></div>
      <div class="game-card"><span class="game-icon">🏓</span><div class="game-label">Ping Pong</div><div class="score-live" id="sc3">--</div></div>
      <div class="game-card"><span class="game-icon">🏐</span><div class="game-label">Vôlei</div><div class="score-live" id="sc4">--</div></div>
      <div class="game-card"><span class="game-icon">🎾</span><div class="game-label">Tênis</div><div class="score-live" id="sc5">--</div></div>
      <div class="game-card"><span class="game-icon">🏊</span><div class="game-label">Natação</div><div class="score-live" id="sc6">--</div></div>
      <div class="game-card"><span class="game-icon">🤸</span><div class="game-label">Ginástica</div><div class="score-live" id="sc7">--</div></div>
      <div class="game-card"><span class="game-icon">🏋️</span><div class="game-label">Levant.</div><div class="score-live" id="sc8">--</div></div>
    </div>

    <!-- BANNER -->
    <div class="worker-banner">
      <div class="banner-inner">
        <span class="banner-flag">🚩</span>
        <span class="banner-text">1° DE MAIO — FORÇA E ORGULHO DO TRABALHADOR</span>
        <span class="banner-flag">🚩</span>
      </div>
    </div>

  </div>

  <script>
    /* ══ EMOJIS EXTRAS CAINDO ══ */
    (function() {
      const container = document.querySelector('.floaties');
      const icons = ['⚽','🏀','🏓','🏐','🎾','🏅','⚡','🏋️','🎯','🤾','🏆','🤸','🏊'];
      for (let i = 0; i < 8; i++) {
        const el = document.createElement('div');
        el.className = 'floaty';
        el.textContent = icons[Math.floor(Math.random() * icons.length)];
        el.style.left = (Math.random() * 100) + '%';
        el.style.fontSize = (Math.random() * 1 + 2.2) + 'em';
        el.style.animationDuration = (Math.random() * 5 + 9) + 's';
        el.style.animationDelay = (Math.random() * 6) + 's';
        container.appendChild(el);
      }
    })();

    /* ══ RELÓGIO ══ */
    const mensagens = [
      '⚡ PARABÉNS A TODOS OS TRABALHADORES! ⚡',
      '🏆 CELEBRANDO O DIA 1° DE MAIO! 🏆',
      '💪 FORÇA, GARRA E DEDICAÇÃO DA NOSSA EQUIPE!',
      '🌊 ENERGIA QUE MOVE O BRASIL! 🌊',
      '🎉 FELIZ DIA DO TRABALHADOR! 🎉',
      '⚽ JOGAR JUNTO É A NOSSA FORÇA! 🏀',
    ];

    let msgIdx = 0;

    function rnd(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

    function updateScores() {
      document.getElementById('sc1').textContent = rnd(60,110) + '-' + rnd(50,100);
      document.getElementById('sc2').textContent = rnd(0,4) + ' x ' + rnd(0,4);
      document.getElementById('sc3').textContent = rnd(8,21) + '-' + rnd(8,21);
      document.getElementById('sc4').textContent = rnd(0,3) + ' x ' + rnd(0,3);
      document.getElementById('sc5').textContent = rnd(0,7) + '-' + rnd(0,7);
      document.getElementById('sc6').textContent = rnd(1,8) + '°';
      document.getElementById('sc7').textContent = rnd(12,16) + '.0 pts';
      document.getElementById('sc8').textContent = rnd(120,200) + 'kg';
    }

    function updateClock() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2,'0');

          <text x="165" y="55" font-size="18" fill="#F4A011" opacity="0.9">⭐</text>
          <text x="90" y="30" font-size="16" fill="#F4A011" opacity="0.9">✨</text>
          <!-- Boneco estrela/roue -->
          <g>
            <animateTransform attributeName="transform" type="rotate"
              values="0 100 120; 15 100 120; 0 100 120; -15 100 120; 0 100 120"
              dur="1.5s" repeatCount="indefinite"/>
            <!-- Cabeça -->
            <circle cx="100" cy="65" r="14" fill="#FBBF24" stroke="#fff" stroke-width="2"/>
            <circle cx="94" cy="63" r="2" fill="#333"/>
            <circle cx="106" cy="63" r="2" fill="#333"/>
            <path d="M93 71 Q100 77 107 71" fill="none" stroke="#333" stroke-width="1.5"/>
            <!-- Laço no cabelo -->
            <ellipse cx="92" cy="54" rx="8" ry="5" fill="#E63946" opacity="0.8"/>
            <!-- Corpo -->
            <line x1="100" y1="79" x2="100" y2="128" stroke="#E63946" stroke-width="8" stroke-linecap="round"/>
            <!-- Braços abertos para lado -->
            <line x1="100" y1="95" x2="55" y2="80" stroke="#E63946" stroke-width="7" stroke-linecap="round"/>
            <line x1="100" y1="95" x2="145" y2="80" stroke="#E63946" stroke-width="7" stroke-linecap="round"/>
            <!-- Pernas abertas (splits) -->
            <line x1="100" y1="128" x2="60" y2="168" stroke="#1B98E0" stroke-width="7" stroke-linecap="round"/>
            <line x1="100" y1="128" x2="140" y2="168" stroke="#1B98E0" stroke-width="7" stroke-linecap="round"/>
          </g>
          <!-- Fita girando -->
          <path fill="none" stroke="#E63946" stroke-width="3" stroke-linecap="round" opacity="0.7">
            <animate attributeName="d"
              values="M100 80 Q130 50 160 70 Q180 90 160 110;
                      M100 80 Q70 50 40 70 Q20 90 40 110;
                      M100 80 Q130 50 160 70 Q180 90 160 110"
              dur="1s" repeatCount="indefinite"/>
          </path>
        </svg>`
      },
    ];

    let currentSportIdx = 0;
    let modalCountdownTimer = null;
    let cdSecs = 8;

    function openAthleteModal() {
      const sport = sports[currentSportIdx];
      document.getElementById('athlete-label').textContent = sport.label;
      document.getElementById('athlete-svg-wrap').innerHTML = sport.svg;

      const modal = document.getElementById('athlete-modal');
      modal.classList.add('active');

      cdSecs = 8;
      updateCountdownDisplay();

      if (modalCountdownTimer) clearInterval(modalCountdownTimer);
      modalCountdownTimer = setInterval(() => {
        cdSecs--;
        updateCountdownDisplay();
        if (cdSecs <= 0) {
          clearInterval(modalCountdownTimer);
          closeAthleteModal();
        }
      }, 1000);

      currentSportIdx = (currentSportIdx + 1) % sports.length;
    }

    function updateCountdownDisplay() {
      document.getElementById('modal-cd').textContent = 'Fechando em ' + cdSecs + 's';
    }

    function closeAthleteModal() {
      document.getElementById('athlete-modal').classList.remove('active');
      if (modalCountdownTimer) clearInterval(modalCountdownTimer);
    }

    // Abre o modal na primeira vez após 5s, depois a cada 3 minutos (180s)
    setTimeout(() => {
      openAthleteModal();
      setInterval(openAthleteModal, 180000);
    }, 5000);
  </script>
</body>
</html>
