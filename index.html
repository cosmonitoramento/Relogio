<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --orange:#FF8C42;
  --blue:#0033A0;
  --light-orange:#FFB366;
}
body{
  min-height:100vh;display:flex;align-items:flex-start;justify-content:center;
  padding:28px 14px 40px;
  font-family:'Arial Black',Arial,sans-serif;
  background:linear-gradient(135deg,#FF8C42 0%,#FFB366 50%,#FF8C42 100%);
  overflow-x:hidden;position:relative;
  color:#0033A0;
}
body::before{
  content:'';position:fixed;inset:0;
  background:radial-gradient(circle at 30% 20%,rgba(255,140,66,0.3) 0%,transparent 50%),
             radial-gradient(circle at 70% 70%,rgba(0,51,160,0.25) 0%,transparent 60%);
  animation:bgPulse 8s ease-in-out infinite alternate;
  z-index:0;pointer-events:none;
}
@keyframes bgPulse{0%{opacity:0.8;}100%{opacity:1;}}

.floaties{position:fixed;inset:0;pointer-events:none;z-index:9999;overflow:hidden;}
.floaty{
  position:absolute;top:-100px;animation:fall linear infinite;
  user-select:none;opacity:0.85;color:white;
  text-shadow:0 0 8px rgba(0,51,160,0.8);
  font-weight:900;letter-spacing:1px;
}
@keyframes fall{
  0%{top:-120px;opacity:0;transform:translateX(0) rotate(0deg);}
  10%{opacity:0.9;}
  100%{top:110vh;opacity:0;transform:translateX(var(--drift)) rotate(var(--rot));}
}

.main-wrap{
  display:flex;flex-direction:column;align-items:center;gap:16px;
  width:100%;max-width:640px;position:relative;z-index:10;
}
.arena-board{
  background:rgba(0,51,160,0.92);border:4px solid #FF8C42;
  border-radius:24px;padding:32px 36px 28px;width:100%;
  position:relative;overflow:hidden;text-align:center;
  box-shadow:0 0 30px rgba(255,140,66,0.6);
  backdrop-filter:blur(8px);
}
.led-ring{
  position:absolute;inset:-4px;border-radius:27px;
  background:conic-gradient(#FF8C42,#FFB366,#0033A0,#FF8C42);
  animation:rotateLED 7s linear infinite;opacity:0.45;z-index:-1;
}
.led-cover{position:absolute;inset:4px;border-radius:20px;background:rgba(0,51,160,0.95);z-index:-1;}
@keyframes rotateLED{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}

.title{
  font-size:2.1rem;font-weight:900;color:white;
  text-shadow:0 0 15px #FF8C42;
  margin-bottom:8px;letter-spacing:2px;
}
.heart-big{font-size:4.2rem;animation:pulseHeart 1.4s ease-in-out infinite;}
@keyframes pulseHeart{0%,100%{transform:scale(1);}50%{transform:scale(1.2);}}

.clock-wrap{margin:12px 0 8px;}
.clock-time{
  font-size:4.8rem;font-weight:900;font-family:'Courier New',monospace;
  color:#FF8C42;text-shadow:0 0 20px #FF8C42;
  letter-spacing:4px;
}
.clock-date{font-size:0.95rem;color:#FFB366;font-family:'Courier New',monospace;letter-spacing:2px;margin-top:4px;}

.subtitle{
  font-size:1.25rem;color:#FFB366;font-weight:700;
  margin:18px 0 20px;line-height:1.3;
}

.cards-grid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%;
}
.c-card{
  background:rgba(255,140,66,0.15);border:2px solid #FF8C42;
  border-radius:16px;padding:16px 8px;text-align:center;
  transition:transform 0.3s;
}
.c-card:hover{transform:scale(1.08);}
.c-icon{font-size:2.6rem;display:block;margin-bottom:8px;}
.c-label{font-size:0.82rem;font-weight:700;color:#FFB366;letter-spacing:1px;}

.footer{
  color:white;font-size:1rem;font-weight:700;text-align:center;
  text-shadow:0 2px 8px rgba(0,0,0,0.6);
}
.footer small{color:#FFB366;font-size:0.8rem;}
.rotating-msg{
  font-size:1.05rem;color:#FFB366;font-weight:700;
  margin-top:16px;min-height:28px;letter-spacing:2px;
}
</style>
</head>
<body>

<div class="floaties" id="fw"></div>

<div class="main-wrap">
  <div class="arena-board">
    <div class="led-ring"></div>
    <div class="led-cover"></div>
    
    <div class="title">SEMANA DE ÉTICA</div>
    <div class="heart-big">💡❤️</div>
    
    <div class="clock-wrap">
      <div class="clock-time" id="ct">--:--</div>
      <div class="clock-date" id="cd">-- -- ----</div>
    </div>

    <div class="subtitle">
      <strong>Na dúvida, pense:</strong><br>
      <span style="font-size:1.45rem;color:#FF8C42;">É ÉTICO?</span>
    </div>

    <div class="cards-grid">
      <div class="c-card"><span class="c-icon">🤝</span><div class="c-label">INTEGRIDADE</div></div>
      <div class="c-card"><span class="c-icon">⚖️</span><div class="c-label">RESPEITO</div></div>
      <div class="c-card"><span class="c-icon">💡</span><div class="c-label">TRANSPARÊNCIA</div></div>
      <div class="c-card"><span class="c-icon">🛑</span><div class="c-label">PARE</div></div>
      <div class="c-card"><span class="c-icon">🧠</span><div class="c-label">PENSE</div></div>
      <div class="c-card"><span class="c-icon">🌟</span><div class="c-label">ÉTICA</div></div>
    </div>

    <div class="rotating-msg" id="rmsg">• SE A RESPOSTA FOR NÃO, PARE! •</div>
  </div>

  <div class="footer">
    ❤️ JIRAU ENERGIA ❤️<br>
    <small>ÉTICA É A NOSSA ENERGIA</small>
  </div>
</div>

<script>
// Palavras que vão cair
const ethicsWords = [
  "ÉTICA", "INTEGRIDADE", "RESPEITO", "HONESTIDADE", 
  "TRANSPARÊNCIA", "ÉTICO", "PAREE", "PENSE", 
  "JIRAU", "INTEGRIDADE", "ÉTICA", "RESPEITO"
];

const icons = ['💡','❤️','🛑','⚖️','🤝','🌟','🔍','✅','🧠'];

const fw = document.getElementById('fw');

function createFloatingItem() {
  const d = document.createElement('div');
  d.className = 'floaty';
  
  // Alterna entre ícone e palavra
  if (Math.random() > 0.5) {
    d.textContent = icons[Math.floor(Math.random()*icons.length)];
    d.style.fontSize = (Math.random()*2.2 + 2.2) + 'em';
  } else {
    d.textContent = ethicsWords[Math.floor(Math.random()*ethicsWords.length)];
    d.style.fontSize = (Math.random()*1.4 + 1.6) + 'em';
  }
  
  d.style.left = Math.random()*100 + '%';
  d.style.animationDuration = (Math.random()*11 + 13) + 's';
  d.style.animationDelay = '-' + (Math.random()*28) + 's';
  d.style.setProperty('--drift', (Math.random()*140 - 70) + 'px');
  d.style.setProperty('--rot', (Math.random()*800 - 400) + 'deg');
  
  fw.appendChild(d);
  
  // Remove depois de cair para não sobrecarregar
  setTimeout(() => d.remove(), 30000);
}

// Cria vários itens flutuantes
for(let i = 0; i < 28; i++){
  createFloatingItem();
}

// Cria novos itens periodicamente
setInterval(() => {
  if (Math.random() > 0.3) createFloatingItem();
}, 800);

// Clock
const MESES = ['JAN','FEV','MAR','ABR','MAI','JUN','JUL','AGO','SET','OUT','NOV','DEZ'];
function pad(n){return String(n).padStart(2,'0');}
function tickClock(){
  const n = new Date();
  document.getElementById('ct').textContent = pad(n.getHours()) + ':' + pad(n.getMinutes());
  document.getElementById('cd').textContent = pad(n.getDate()) + ' ' + MESES[n.getMonth()] + ' ' + n.getFullYear();
}
setInterval(tickClock,1000); tickClock();

// Mensagens rotativas
const msgs = [
  '• SE A RESPOSTA FOR NÃO, PARE! •',
  '• ÉTICA NOS UNE •',
  '• INTEGRIDADE É NOSSA ENERGIA •',
  '• NA DÚVIDA, PARE E PENSE •'
];
let mi = 0;
const rm = document.getElementById('rmsg');
setInterval(() => {
  rm.style.opacity = 0;
  setTimeout(() => {
    mi = (mi + 1) % msgs.length;
    rm.textContent = msgs[mi];
    rm.style.opacity = 1;
  }, 600);
}, 3800);
</script>
</body>
</html>
