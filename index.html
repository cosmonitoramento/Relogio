
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{
  min-height:100vh;
  font-family:'Bebas Neue',sans-serif;
  background:#0a0a0a;
  overflow-x:hidden;
  display:flex;flex-direction:column;align-items:center;
  position:relative;
}

/* Céu gradiente noturno de estádio */
.sky{
  position:fixed;inset:0;
  background:radial-gradient(ellipse 80% 60% at 50% 0%, #1a0a3a 0%, #0a0a1a 50%, #000 100%);
  z-index:0;
}

/* Holofotes */
.spotlight{
  position:fixed;top:-60px;
  width:3px;height:100vh;
  transform-origin:top center;
  opacity:0.08;
  pointer-events:none;z-index:1;
}
.spotlight.l1{left:15%;background:linear-gradient(180deg,#fff 0%,transparent 80%);transform:rotate(15deg);animation:spotAnim 6s ease-in-out infinite alternate;}
.spotlight.l2{left:30%;background:linear-gradient(180deg,#fff 0%,transparent 70%);transform:rotate(-10deg);animation:spotAnim 8s ease-in-out infinite alternate-reverse;}
.spotlight.l3{right:15%;background:linear-gradient(180deg,#fff 0%,transparent 80%);transform:rotate(-15deg);animation:spotAnim 7s ease-in-out infinite alternate;}
.spotlight.l4{right:30%;background:linear-gradient(180deg,#fff 0%,transparent 70%);transform:rotate(10deg);animation:spotAnim 5s ease-in-out infinite alternate-reverse;}
@keyframes spotAnim{0%{opacity:0.06;}100%{opacity:0.14;}}

/* Gramado */
.field{
  position:fixed;bottom:0;left:0;right:0;height:35vh;
  background:repeating-linear-gradient(
    180deg,
    #1a5c2a 0px,#1a5c2a 28px,
    #1e6830 28px,#1e6830 56px
  );
  z-index:2;
}
.field::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 90% 40% at 50% 100%,rgba(0,200,80,0.08),transparent 70%);
}
/* Linha do meio campo */
.field::after{
  content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:2px;height:100%;background:rgba(255,255,255,0.12);
}

/* Países caindo */
.floaties{position:fixed;inset:0;pointer-events:none;z-index:10;overflow:hidden;}
.floaty{
  position:absolute;top:-160px;
  display:flex;flex-direction:column;align-items:center;gap:5px;
  animation:fallSmooth linear forwards;
  opacity:0;
}
@keyframes fallSmooth{
  0%{top:-160px;opacity:0;}
  5%{opacity:1;}
  85%{opacity:1;}
  100%{top:105vh;opacity:0;}
}
.floaty .flag{
  font-size:3rem;
  filter:drop-shadow(0 4px 12px rgba(0,0,0,0.8));
  animation:flagWave 2s ease-in-out infinite;
}
@keyframes flagWave{
  0%,100%{transform:rotate(-4deg) scale(1);}
  50%{transform:rotate(4deg) scale(1.05);}
}
.floaty .cname{
  font-size:0.75rem;font-weight:700;
  color:#fff;letter-spacing:2px;
  font-family:'Oswald',sans-serif;
  text-shadow:0 2px 8px rgba(0,0,0,1),0 0 16px rgba(0,0,0,1);
  background:rgba(0,0,0,0.55);
  padding:2px 8px;border-radius:4px;
}

/* Partículas de confete */
.confetti{position:fixed;inset:0;pointer-events:none;z-index:3;overflow:hidden;}
.conf{
  position:absolute;top:-20px;width:8px;height:8px;border-radius:1px;
  animation:confFall linear infinite;opacity:0;
}
@keyframes confFall{
  0%{top:-20px;opacity:0;transform:rotate(0deg) translateX(0);}
  10%{opacity:0.9;}
  100%{top:110vh;opacity:0;transform:rotate(var(--rot)) translateX(var(--sx));}
}

/* Conteúdo principal */
.wrap{position:relative;z-index:20;width:100%;max-width:600px;display:flex;flex-direction:column;align-items:center;padding-top:24px;}

/* Título FIFA */
.fifa-label{
  font-size:0.9rem;letter-spacing:8px;color:rgba(255,255,255,0.5);
  font-family:'Oswald',sans-serif;font-weight:400;
  margin-bottom:6px;
}
.world-cup-title{
  font-size:3.8rem;color:#FFD700;
  letter-spacing:6px;line-height:1;
  text-shadow:0 0 60px rgba(255,215,0,0.6),0 0 20px rgba(255,215,0,0.4);
  text-align:center;
}
.world-cup-sub{
  font-size:1.6rem;color:#fff;letter-spacing:4px;
  margin-top:2px;text-align:center;
  text-shadow:0 2px 20px rgba(0,0,0,0.8);
}

/* Relógio */
.clock-box{
  margin:16px 0;
  display:flex;flex-direction:column;align-items:center;
}
.clock-time{
  font-size:5rem;color:#FFD700;letter-spacing:8px;
  text-shadow:0 0 30px rgba(255,215,0,0.8),0 0 60px rgba(255,215,0,0.3);
  line-height:1;
}
.clock-date{font-size:0.9rem;color:rgba(255,255,255,0.5);letter-spacing:4px;font-family:'Oswald',sans-serif;font-weight:400;margin-top:4px;}

/* Troféu SVG área */
.trophy-area{width:100%;display:flex;justify-content:center;margin:0;}

/* Msg rotativa */
.rotating-msg{
  font-size:1.1rem;color:rgba(255,255,255,0.7);letter-spacing:4px;
  text-align:center;transition:opacity 0.6s;
  margin:10px 0 60px;font-family:'Oswald',sans-serif;font-weight:400;
}
</style>
</head>

<script>
// Confetes
const confColors=['#FFD700','#FF4444','#4444FF','#44FF44','#FF44FF','#44FFFF','#fff','#FF8C00'];
const confEl=document.getElementById('conf');
for(let i=0;i<35;i++){
  const c=document.createElement('div');
  c.className='conf';
  c.style.left=Math.random()*100+'%';
  c.style.background=confColors[Math.floor(Math.random()*confColors.length)];
  c.style.width=(Math.random()*6+4)+'px';
  c.style.height=(Math.random()*10+5)+'px';
  c.style.animationDuration=(Math.random()*8+10)+'s';
  c.style.animationDelay='-'+(Math.random()*15)+'s';
  c.style.setProperty('--rot',(Math.random()*720-360)+'deg');
  c.style.setProperty('--sx',(Math.random()*80-40)+'px');
  c.style.borderRadius=Math.random()>0.5?'50%':'2px';
  confEl.appendChild(c);
}

// Países
const paises=[
  {flag:'🇧🇷',name:'BRASIL'},
  {flag:'🇦🇷',name:'ARGENTINA'},
  {flag:'🇫🇷',name:'FRANÇA'},
  {flag:'🇩🇪',name:'ALEMANHA'},
  {flag:'🇵🇹',name:'PORTUGAL'},
  {flag:'🇪🇸',name:'ESPANHA'},
  {flag:'🏴󠁧󠁢󠁥󠁮󠁧󠁿',name:'INGLATERRA'},
  {flag:'🇮🇹',name:'ITÁLIA'},
  {flag:'🇺🇾',name:'URUGUAI'},
  {flag:'🇳🇱',name:'HOLANDA'},
  {flag:'🇯🇵',name:'JAPÃO'},
  {flag:'🇲🇦',name:'MARROCOS'},
  {flag:'🇺🇸',name:'EUA'},
  {flag:'🇧🇪',name:'BÉLGICA'},
];

const fw=document.getElementById('fw');
let ativos=0;
const MAX=3;

function createFlag(){
  if(ativos>=MAX) return;
  ativos++;
  const p=paises[Math.floor(Math.random()*paises.length)];
  const d=document.createElement('div');
  d.className='floaty';
  d.innerHTML=`<div class="flag">${p.flag}</div><div class="cname">${p.name}</div>`;
  const dur=Math.random()*5+18;
  d.style.left=(Math.random()*82+6)+'%';
  d.style.animationDuration=dur+'s';
  fw.appendChild(d);
  setTimeout(()=>{d.remove();ativos--;},dur*1000+200);
}
createFlag();
setInterval(createFlag,5000);

// Relógio
const MESES=['JAN','FEV','MAR','ABR','MAI','JUN','JUL','AGO','SET','OUT','NOV','DEZ'];
const DIAS=['DOM','SEG','TER','QUA','QUI','SEX','SÁB'];
function pad(n){return String(n).padStart(2,'0');}
function tick(){
  const n=new Date();
  document.getElementById('ct').textContent=pad(n.getHours())+':'+pad(n.getMinutes())+':'+pad(n.getSeconds());
  document.getElementById('cd').textContent=DIAS[n.getDay()]+' · '+pad(n.getDate())+' '+MESES[n.getMonth()]+' '+n.getFullYear();
}
setInterval(tick,1000);tick();

// Msgs
const msgs=['THE WORLD\'S GAME','ONE WORLD · ONE CUP','BRASIL 2026','THE GREATEST SHOW ON EARTH','VAMOS CAMPEÃO'];
let mi=0;const rm=document.getElementById('rmsg');
setInterval(()=>{
  rm.style.opacity=0;
  setTimeout(()=>{mi=(mi+1)%msgs.length;rm.textContent=msgs[mi];rm.style.opacity=1;},600);
},4000);
</script>
</body>
</html>
